<!DOCTYPE html> 
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Assignment</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            border-radius: 18px;
            padding: 35px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
        }

        h1 {
            text-align: center;
            color: #0077ff;
            margin-bottom: 25px;
            font-size: 2.2rem;
            border-bottom: 3px solid #0077ff;
            padding-bottom: 10px;
        }

        .info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            margin: 12px 0;
            padding: 15px 20px;
            border-radius: 12px;
            border-left: 5px solid #0077ff;
            transition: 0.3s;
        }

        .info:hover {
            background: #0077ff;
            color: white;
            transform: scale(1.02);
        }

        .label {
            font-weight: bold;
        }

        .value {
            color: #444;
        }

        .info:hover .value {
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .info {
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }

            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🚀 My DevOps Assignment</h1>

        <div class="info">
            <span class="label">Name</span>
            <span class="value">Laxman Adhikari</span>
        </div>

        <div class="info">
            <span class="label">College</span>
            <span class="value">MIT Academy of Engineering</span>
        </div>

        <div class="info">
            <span class="label">Branch</span>
            <span class="value">Computer Engineering</span>
        </div>

        <div class="info">
            <span class="label">Email</span>
            <span class="value">your-email@gmail.com</span>
        </div>

        <div class="info">
            <span class="label">Date</span>
            <span class="value">09 July 2026</span>
        </div>

        <footer>
            Designed with ❤️ using HTML & CSS
        </footer>
    </div>

</body>
</html>
